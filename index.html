<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Skor Pertandingan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 20px; }
        .board { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; margin-top: 30px; }
        .match { background: #1e1e1e; padding: 15px 25px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #00e676; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .team { font-size: 1.1em; font-weight: 600; width: 35%; }
        .score { font-size: 1.6em; font-weight: bold; color: #00e676; }
        .status { font-size: 0.85em; color: #888; margin-top: 5px; }
        .center-info { display: flex; flex-direction: column; align-items: center; }
        #loading { color: #00e676; font-style: italic; }
    </style>
</head>
<body>

    <h1>Live Score Liga ⚽</h1>
    <div id="loading">Menghubungkan ke server...</div>
    <div id="match-board" class="board"></div>

    <script>
        async function loadMatches() {
            try {
                // Memanggil file backend kita sendiri di Vercel
                const response = await fetch('/api/match');
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                const board = document.getElementById('match-board');
                
                data.forEach(match => {
                    const matchCard = `
                        <div class="match">
                            <div class="team" style="text-align: right;">${match.homeTeam}</div>
                            <div class="center-info">
                                <div class="score">${match.score}</div>
                                <div class="status">${match.status}</div>
                            </div>
                            <div class="team" style="text-align: left;">${match.awayTeam}</div>
                        </div>
                    `;
                    board.innerHTML += matchCard;
                });

            } catch (error) {
                document.getElementById('loading').innerText = "Gagal memuat pertandingan.";
                document.getElementById('loading').style.color = "red";
                console.error("Error fetching matches:", error);
            }
        }

        // Jalankan saat web dibuka
        loadMatches();
    </script>
</body>
</html>
